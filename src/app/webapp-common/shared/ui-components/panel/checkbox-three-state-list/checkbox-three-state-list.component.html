<div class="list-container" [class.empty]="options()?.length === 0">
  @for (option of options(); track option.value) {
    <span mat-menu-item>
    <mat-checkbox
      class="w-100 d-flex"
      data-id="versionFilterSelector"
      [value]="option.value"
      [checked]="processedState().checkedList?.includes(option.value) || processedState().indeterminateState[option.value] === checkboxState.exclude"
      [indeterminate]="processedState().indeterminateState[option.value] === checkboxState.exclude"
      (change)="onFilterChanged($event)"
    >
      <span
        [smTooltip]="option.tooltip || option.label"
        smShowTooltipIfEllipsis
        [showAlwaysTooltip]="!!option.tooltip"
        matTooltipPosition="above"
        data-id="FilterOption"
        class="ellipsis label"
      >{{ option.label }}</span>
    </mat-checkbox>
  </span>
  }
  @if (options()?.length === 0) {
    <div class="empty-menu flex-middle">No item found</div>
  }
  @if (options() === null) {
    <div class="flex-middle mt-5">
      <mat-spinner class="m-auto" [diameter]="32" [strokeWidth]="4" color="accent"></mat-spinner>
    </div>
  }
</div>
