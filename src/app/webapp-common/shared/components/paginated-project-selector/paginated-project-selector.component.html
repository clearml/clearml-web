<section class="w-100">
  <mat-form-field appearance="outline" class="m-0 no-bottom w-100" [class.no-bottom-border-radius]="selectedProjects().length">
    <mat-label>{{ label() }} @if (hint()) {<mat-icon fontSet="al" fontIcon="al-ico-info-circle" class="xs" [smTooltip]="hint()"></mat-icon>}</mat-label>
    <input #inputRef matInput type="text"
           [matAutocomplete]="auto"
           [placeholder]="placeHolder()"
           [ngModel]="data()"
           (input)="onInput(inputRef.value)"
           (keydown.enter)="$event.preventDefault()"
           (focusout)="onTouched && onTouched()"
    >
    @if (data()) {
      <button class="sm" mat-icon-button matSuffix (click)="$event.preventDefault(); $event.stopPropagation(); clearInput(); inputRef.focus()">
        <mat-icon fontSet="al" fontIcon="al-ico-dialog-x"></mat-icon>
      </button>
    } @else {
      <mat-icon fontSet="al" fontIcon="al-ico-search" matSuffix></mat-icon>
    }
    <mat-autocomplete #auto="matAutocomplete"
                      class="light-theme"
                      [displayWith]="displayFn.bind(this)"
                      (opened)="(!projects()?.length || data()) && getEntities.emit(data())"
                      autoActiveFirstOption>
      @for (project of orderedOptions(); track project.id) {
        <mat-option [value]="project" (onSelectionChange)="autocompleteEnterHandler($event, project)" >
          <sm-project-option-row
            smClickStopPropagation
            [project]="project"
            [searchedText]="inputRef.value"
            [selected]="isProjectSelected(project)"
            (toggleSelection)="toggleSelection(project)"
            (optionClicked)="optionClicked($event, project)"
          ></sm-project-option-row>
        </mat-option>
      }

      @if (loading() && !projects()?.length) {
        <div class="py-4 pe-none">
          <mat-spinner class="m-auto" [diameter]="32" [strokeWidth]="4" color="accent"></mat-spinner>
        </div>
      }
      <sm-dots-load-more smClickStopPropagation [class.hidden]="!projects()?.length || noMoreOptions()" [loading]="loading()" (loadMore)="loadMoreEntities(data())"></sm-dots-load-more>
      <!-- Empty mat-option, so the autocomplete menu will always pop -->
      <mat-option disabled style="height: 0; min-height: 0; padding:0"></mat-option>
    </mat-autocomplete>
  </mat-form-field>

  @if (selectedProjects().length) {
    <div class="selected-items">
      @for (project of selectedProjects(); track project.id) {
        <sm-project-selected-row
          [project]="project"
          (toggleSelection)="toggleSelection(project)"
        ></sm-project-selected-row>
      }
    </div>
  }
</section>
