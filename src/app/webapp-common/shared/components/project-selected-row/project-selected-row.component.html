<div class="selected-project-row">
  <div class="ms-2 ellipsis" smShowTooltipIfEllipsis [smTooltip]="project().name">{{ project()?.name }}</div>
  <div>
  @if (!hideTrash()) {
    <button mat-icon-button class="sm" (click)=" $event.preventDefault(); toggleSelection.emit()">
      <mat-icon fontSet="al" fontIcon="al-ico-trash"></mat-icon>
    </button>
  }
  </div>
</div>
