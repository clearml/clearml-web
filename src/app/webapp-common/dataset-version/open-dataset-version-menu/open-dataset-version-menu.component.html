@if (activateFromMenuButton()) {
  <div [matMenuTriggerFor]="experimentMenu"
    class="p-0 cell menu-button al-icon sm-md al-ico-bars-menu"
  ></div>
} @else {
  <div
    style="visibility: hidden; position: fixed"
    [style.left.px]="position().x"
    [style.top.px]="position().y"
    [matMenuTriggerFor]="experimentMenu">
  </div>
}
<mat-menu #experimentMenu="matMenu" [hasBackdrop]="false" class="light-theme entity-context-menu">
  @if (tableMode()) {
    <button mat-menu-item (click)="toggleDetails()">
      <mat-icon fontSet="al" [fontIcon]="icons.DETAILS" data-id="detailsOption"></mat-icon>
      Details
    </button>
    <hr>
  }
  <button mat-menu-item
          [matMenuTriggerFor]="tagMenu.matMenu()"
          [disabled]="selectedDisableAvailable()[menuItems.tags]?.disable"
          (menuOpened)="tagMenuOpened()"
          (menuClosed)="tagMenuClosed()">
    <mat-icon fontSet="al" [fontIcon]="icons.TAG" data-id="addTagOption"></mat-icon>
    <span>{{selectedDisableAvailable()[menuItems.tags]?.available | menuItemText : 'Add Tag' : selectedDisableAvailableIsMultiple() }}</span>
  </button>
  <button
    mat-menu-item
    (click)="publishPopup()" data-id="Publish Option"
    [disabled]="selectedDisableAvailable()[menuItems.publish]?.disable">
    <mat-icon fontSet="al" [fontIcon]="icons.PUBLISHED"></mat-icon>
    <span>{{selectedDisableAvailable()[menuItems.publish]?.available | menuItemText : 'Publish' : selectedDisableAvailableIsMultiple() }}</span>
  </button>
<!--  <button mat-menu-item (click)="renamePopup()" data-id="renameOption">-->
<!--    <mat-icon fontSet="al" [fontIcon]="icons.EDIT"></mat-icon>Rename-->
<!--  </button>-->

<!--  <button mat-menu-item (click)="changeVersion()" data-id="changeVersionOption"-->
<!--          [disabled]="selectedDisableAvailable()[menuItems.changeVersion]?.disable"-->
<!--  >-->
<!--    <mat-icon fontSet="al" [fontIcon]="icons.REFRESH"></mat-icon>Edit Version-->
<!--  </button>-->



  <button mat-menu-item (click)="restoreArchive(entityTypeEnum.dataset)" data-id="archiveOption"
          [disabled]="selectedDisableAvailable()[menuItems.archive]?.disable">
    <mat-icon fontSet="al" [fontIcon]="isArchive() ? icons.RESTORE : icons.ARCHIVE"></mat-icon>
    {{selectedDisableAvailable()[menuItems.archive]?.available | menuItemText : isArchive() ? 'Restore from Archive' : 'Archive' : selectedDisableAvailableIsMultiple()}}
  </button>

  @if (isArchive()) {
    <button mat-menu-item (click)="deleteExperimentPopup(entityTypeEnum.dataset, true)"
            [disabled]="selectedDisableAvailable()[menuItems.delete]?.disable">
      <mat-icon fontSet="al" [fontIcon]="icons.REMOVE" data-id="deleteOption"></mat-icon>
      {{selectedDisableAvailable()[menuItems.delete]?.available | menuItemText : 'Delete' : selectedDisableAvailableIsMultiple()}}
    </button>
  }
</mat-menu>

<sm-tags-menu
  #tagMenu
  [tags]="experiment()?.tags"
  [filterByProject]="filterTagsByProject()"
  [projectTags]="projectTags()"
  [companyTags]="companyTags()"
  (tagSelected)="tagSelected.emit($event)"
  (getCompanyTags)="getCompanyTags.emit()"
></sm-tags-menu>

<ng-template #publishTemplate let-selectedExperiments>
  <div class="mb-3">
    @if(selectedExperiments.length === 1){
      <span
        class="ellipsis inline font-weight-bold me-1"
        style="max-width: 200px;"
        [smTooltip]="selectedExperiments[0]?.name"
        smShowTooltipIfEllipsis
      >{{selectedExperiments[0]?.name}}</span>
    } @else {
      <span class="font-weight-bold me-1">{{selectedExperiments.length}} dataset versions</span>
    }
    <span class="inline">status will be set to Published.</span>
  </div>
</ng-template>
